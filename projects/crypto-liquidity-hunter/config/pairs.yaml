# pairs: List of trading pairs to monitor (format: EXCHANGE:SYMBOL)
pairs:
  - 'binance:BTC/USDT'
  - 'binance:ETH/USDT'
  - 'binance:SOL/USDT'

data_fetch:
  timeframe: '1h'          # default timeframe for scanning (1h gives quality, 5m gives noise)
  ohlcv_limit: 1000        # bars to fetch
  atr_period: 14

liquidity_mapper:
  equal_touch_tolerance: 0.001    # 0.1%
  swing_lookback: 5
  round_tolerance: 0.005          # 0.5%
  min_swing_strength: 3

sweep_detector:
  sweep_multiplier: 0.6           # ATR threshold (0.6×ATR)
  volume_multiplier: 1.2          # volume spike (20% above avg)
  confirmation_bars: 3            # wait 3 bars for rejection
  wick_ratio: 0.45                # wick ≥45% of candle range
  min_sweep_pct: 0.25             # minimum sweep depth (0.25%)

signal_engine:
  risk_per_trade: 0.01            # 1% per trade
  min_risk_reward: 1.5
  stop_buffer_pct: 0.001          # 0.1%
  target_buffer_pct: 0.001
  retracement_levels: [0.5, 0.618, 0.786]

backtester:
  commission_pct: 0.001
  slippage_pct: 0.0005
  max_concurrent_trades: 3
  timeout_bars: 48

alerts:
  telegram:
    enabled: false
    bot_token: ''
    chat_id: ''
